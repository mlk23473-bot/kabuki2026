<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>マイスケジュール - 歌舞伎町 UP GATE 2026</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* 横スクロールバーのスタイルカスタマイズ */
    ::-webkit-scrollbar {
      height: 8px;
    }
    ::-webkit-scrollbar-track {
      background: #f1f5f9;
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #94a3b8;
    }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen p-4 md:p-8 selection:bg-indigo-200 selection:text-indigo-900">
  <div class="max-w-5xl mx-auto">
    <!-- ヘッダー -->
    <header class="mb-8 text-center">
      <h1 class="text-3xl md:text-4xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-indigo-600 to-purple-600 mb-2">
        歌舞伎町 UP GATE 2026
      </h1>
      <p class="text-lg font-bold text-slate-600">自分専用タイムテーブル (5月5日)</p>
    </header>

    <!-- ガントチャート (タイムライン表示) -->
    <section class="mb-10">
      <h2 class="text-xl font-bold mb-4 flex items-center gap-2 text-slate-700">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-indigo-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
        </svg>
        タイムライン
      </h2>
      <div class="flex border rounded-xl overflow-hidden bg-white shadow-md">
        <!-- 左列: アイドル名 -->
        <div class="w-24 md:w-40 shrink-0 border-r border-slate-200 bg-slate-50 z-20" id="artist-names">
          <!-- JSで生成 -->
        </div>
        <!-- 右列: タイムライン (横スクロール) -->
        <div class="overflow-x-auto flex-grow relative cursor-grab active:cursor-grabbing" id="timeline-scroll-area">
          <div id="timeline" class="min-w-[700px] md:min-w-[900px] relative">
            <!-- JSで生成 -->
          </div>
        </div>
      </div>
    </section>

    <!-- 時系列リスト表示 -->
    <section>
      <h2 class="text-xl font-bold mb-4 flex items-center gap-2 text-slate-700">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-indigo-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 10h16M4 14h16M4 18h16" />
        </svg>
        時系列リスト
      </h2>
      <div id="schedule-list" class="space-y-3">
        <!-- JSで生成 -->
      </div>
    </section>
  </div>

  <script>
    // 対象アイドルのスケジュールデータ (修正済み)
    const scheduleData = [
      {
        name: "ミームトーキョー",
        events: [
          { type: "live", start: "13:00", end: "13:25", venue: "新宿MARZ" },
          { type: "buppan", start: "13:55", end: "14:55", venue: "JAM17" }
        ]
      },
      {
        name: "さよならステイチューン",
        events: [
          { type: "live", start: "16:40", end: "17:05", venue: "Zirco Tokyo" },
          { type: "buppan", start: "17:35", end: "18:35", venue: "APEXIA" }
        ]
      },
      {
        name: "虹のコンキスタドール",
        events: [
          { type: "live", start: "18:50", end: "19:20", venue: "Zepp Shinjuku (TOKYO)" },
          { type: "buppan", start: "19:35", end: "20:35", venue: "Zepp Shinjuku" }
        ]
      },
      {
        name: "fishbowl",
        events: [
          { type: "live", start: "19:20", end: "19:45", venue: "新宿LOFT" },
          { type: "buppan", start: "19:55", end: "20:55", venue: "新宿LOFT" }
        ]
      },
      {
        name: "ChumToto",
        events: [
          { type: "live", start: "19:20", end: "19:45", venue: "SHINJUKU WALLY" },
          { type: "buppan", start: "19:55", end: "20:55", venue: "新宿WALLY" }
        ]
      }
    ];

    const startHour = 12; // 12:00開始
    const endHour = 21;   // 21:00終了
    const totalMinutes = (endHour - startHour) * 60;

    // "HH:MM" を分に変換
    function timeToMinutes(timeStr) {
      const [h, m] = timeStr.split(':').map(Number);
      return h * 60 + m;
    }

    // 画面のレンダリング
    function render() {
      const namesContainer = document.getElementById('artist-names');
      const timelineContainer = document.getElementById('timeline');
      const listContainer = document.getElementById('schedule-list');
      
      let namesHtml = `<div class="h-8 border-b border-slate-200"></div>`; // ヘッダー用余白
      let timelineHtml = `<div class="relative h-8 border-b border-slate-200 bg-white">`;
      
      // 1. タイムラインの目盛り線を生成
      for (let h = startHour; h <= endHour; h++) {
        const leftPct = ((h - startHour) * 60 / totalMinutes) * 100;
        timelineHtml += `
          <div class="absolute top-2 text-xs text-slate-500 font-bold -translate-x-1/2" style="left: ${leftPct}%">${h}:00</div>
          <div class="absolute top-8 w-px bg-slate-200 border-dashed" style="left: ${leftPct}%; height: ${scheduleData.length * 80}px; z-index: 0;"></div>
        `;
        // 30分の線も薄く追加
        if (h < endHour) {
            const halfPct = ((h - startHour + 0.5) * 60 / totalMinutes) * 100;
            timelineHtml += `<div class="absolute top-8 w-px bg-slate-100" style="left: ${halfPct}%; height: ${scheduleData.length * 80}px; z-index: 0;"></div>`;
        }
      }
      timelineHtml += `</div>`;
      
      // 2. 各アイドルの行とブロックを生成
      scheduleData.forEach((artist) => {
        // 左側の名前列
        namesHtml += `
          <div class="h-20 border-b border-slate-100 flex items-center justify-center p-2 text-center text-xs md:text-sm font-bold text-slate-700 break-words">
            ${artist.name}
          </div>
        `;
        
        // 右側のタイムライン列
        timelineHtml += `<div class="relative h-20 border-b border-slate-100 group hover:bg-slate-50/50 transition-colors">`;
        
        artist.events.forEach(event => {
          const startMin = timeToMinutes(event.start);
          const endMin = timeToMinutes(event.end);
          const leftPct = ((startMin - startHour * 60) / totalMinutes) * 100;
          const widthPct = ((endMin - startMin) / totalMinutes) * 100;
          
          const isLive = event.type === 'live';
          // ライブはピンク系、特典会はブルー系のグラデーション
          const bgColor = isLive ? 'bg-gradient-to-r from-pink-500 to-rose-500' : 'bg-gradient-to-r from-cyan-500 to-blue-500';
          const label = isLive ? '🎤 LIVE' : '📸 特典会';
          
          timelineHtml += `
            <div class="absolute top-2 bottom-2 rounded shadow-sm ${bgColor} text-white p-1.5 flex flex-col justify-between z-10 hover:z-20 hover:scale-[1.02] hover:shadow-md transition-all duration-200" 
                 style="left: ${leftPct}%; width: ${widthPct}%;" title="${artist.name} - ${label} \n時間: ${event.start}〜${event.end} \n会場: ${event.venue}">
              <div class="flex justify-between items-start gap-1">
                <span class="font-bold drop-shadow-sm text-[10px] md:text-xs whitespace-nowrap overflow-hidden text-ellipsis">${label}</span>
                <span class="text-[9px] bg-black/20 px-1 rounded whitespace-nowrap">${event.start}-${event.end}</span>
              </div>
              <div class="truncate font-medium text-[9px] md:text-xs drop-shadow-sm mt-0.5 opacity-95">@${event.venue}</div>
            </div>
          `;
        });
        timelineHtml += `</div>`;
      });
      
      namesContainer.innerHTML = namesHtml;
      timelineContainer.innerHTML = timelineHtml;
      
      // 3. スケジュールリストの生成 (時間順ソート)
      const allEvents = [];
      scheduleData.forEach(artist => {
        artist.events.forEach(event => {
          allEvents.push({ ...event, artistName: artist.name });
        });
      });
      allEvents.sort((a, b) => timeToMinutes(a.start) - timeToMinutes(b.start));
      
      let listHtml = '';
      allEvents.forEach(event => {
        const isLive = event.type === 'live';
        const badgeColor = isLive ? 'bg-pink-100 text-pink-800 border-pink-200' : 'bg-blue-100 text-blue-800 border-blue-200';
        const borderColor = isLive ? 'border-l-pink-500' : 'border-l-blue-500';
        const label = isLive ? 'LIVE' : '特典会';
        
        listHtml += `
          <div class="flex flex-col sm:flex-row sm:items-center p-3 md:p-4 rounded-lg border bg-white shadow-sm hover:shadow-md transition-shadow gap-2 md:gap-4 border-l-4 ${borderColor}">
            <div class="flex items-center gap-2 md:gap-3 min-w-[130px]">
              <span class="text-lg font-black text-slate-800">${event.start}</span>
              <span class="text-sm text-slate-400 font-medium">〜 ${event.end}</span>
            </div>
            <div class="flex-grow">
              <div class="font-bold text-base md:text-lg text-slate-800">${event.artistName}</div>
              <div class="text-xs md:text-sm text-slate-500 flex items-center gap-1 mt-1 font-medium">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor">
                  <path fill-rule="evenodd" d="M5.05 4.05a7 7 0 119.9 9.9L10 18.9l-4.95-4.95a7 7 0 010-9.9zM10 11a2 2 0 100-4 2 2 0 000 4z" clip-rule="evenodd" />
                </svg>
                ${event.venue}
              </div>
            </div>
            <div class="shrink-0 flex sm:block justify-end">
              <span class="px-3 py-1 rounded-full text-xs font-bold border shadow-sm ${badgeColor}">${label}</span>
            </div>
          </div>
        `;
      });
      listContainer.innerHTML = listHtml;

      // タイムラインの初期スクロール位置を調整
      const scrollArea = document.getElementById('timeline-scroll-area');
      scrollArea.scrollLeft = 0; 
    }

    // マウスドラッグで横スクロールできるようにする処理
    document.addEventListener('DOMContentLoaded', () => {
      render();
      
      const slider = document.getElementById('timeline-scroll-area');
      let isDown = false;
      let startX;
      let scrollLeft;

      slider.addEventListener('mousedown', (e) => {
        isDown = true;
        startX = e.pageX - slider.offsetLeft;
        scrollLeft = slider.scrollLeft;
      });
      slider.addEventListener('mouseleave', () => {
        isDown = false;
      });
      slider.addEventListener('mouseup', () => {
        isDown = false;
      });
      slider.addEventListener('mousemove', (e) => {
        if (!isDown) return;
        e.preventDefault();
        const x = e.pageX - slider.offsetLeft;
        const walk = (x - startX) * 2; // スクロール速度
        slider.scrollLeft = scrollLeft - walk;
      });
    });
  </script>
</body>
</html>
